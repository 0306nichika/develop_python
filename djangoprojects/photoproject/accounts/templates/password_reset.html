<!--ベーステンプレートを適用する-->
{% extends 'base.html' %}
<!--ヘッダー情報のページタイトルを設定する-->
{% block title %}Sign up{% endblock %}

    {% block content %}
    <!--Bootstrapのグリットシステム-->
    <div class="container">
        <!--行を配置-->
        <div class="row">
            <!--列の上下パティングはpy-4-->
            <div class="col py-4">
                <hr>
                <h3>パスワードをリセットしますか</h3>
                <p>登録済みのメールアドレスを入力してください。パスワードのリセットリンクをお届けします</p>
                <br>
                <!--メール送信のためのフォームを配置-->
                <form action="" method="POST" class="text-center">
                    {% csrf_token %}
                    <!--formに格納されているインプットボックスとラベルを出力-->
                    {{form}}
                    <!--送信ボタン-->
                    <input type="submit" value="メールを受け取る" /><br>
                    <!--トップページのリンク-->
                    <a href="{% url 'photo:index' %}">Photo Galary</a>
                </form> 
            </div>
        </div>
    </div>
    {% endblock %}
