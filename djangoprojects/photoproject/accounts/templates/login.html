{% load static %}
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>

  <link rel="icon" href="{% static 'img/lostlife.png' %}">


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .login-card {
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      border-radius: 15px;
      background: white;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .logo {
      width: 70px;
    }
  </style>
</head>

<body>

  <div class="login-card text-center">

    <img src="{% static 'img/lostlife.png' %}" class="logo mb-3">

    <h3 class="mb-3">～Lost Life～</h3>

    {% if form.errors %}
      <div class="alert alert-danger">
        ユーザー名またはパスワードが違います
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <input type="text"
             name="username"
             class="form-control mb-3"
             placeholder="ユーザー名"
             required>

      <input type="password"
             name="password"
             class="form-control mb-3"
             placeholder="パスワード"
             required>

      <button class="btn btn-primary w-100 mb-2" type="submit">
        ログイン
      </button>

      <a href="{% url 'password_reset' %}" class="small d-block mb-2">
        パスワードを忘れた方
      </a>

      <input type="hidden" name="next" value="{% url 'photo:index' %}">
    </form>

  </div>

</body>
</html>
