<!--ベーステンプレートを適用する-->
{% extends 'base.html' %}
<!--ヘッダー情報のページタイトルを設定する-->
{% block title %}Sign up{% endblock %}

        {% block contents %}
        <!--Bootstrapのグリッドシステム-->
        <hr>
        <div class = "container">
            <!--行を配置-->
            <div class = "row">
                <!--列の左右に余白offsetを入れる-->
                <div class = "col offset-2">
                    <h3>サインアップ</h3>
                    <!--サインアップのフォームを配置-->
                    <from method = "post">
                        {% csrf_token %}
                        <!--formからフィールドを取り出す-->
                    </from>
