
{% extends 'base.html' %}
<!--ヘッダー情報のページタイトルを設定する-->
{% block title %}Post{% endblock %}

    {% block content %}
    <!--Bootstrapのグリットシステム-->
    <br>
    <div class="container">
        <!--行を配置-->
        <div class="row">
            <!--列の左右に余白offset-4を入れる。列の上下パティングpy-4-->
            <div class="col offset-2">

                <form method = "POST"
                    enctype="multipart/form-data">
                    {% csrf_token %}
                    <table>
                        <tr>
                            <th>カテゴリ</th>
                            <td>{{ form.category}}</td>
                        </tr>
                        <tr>
                            <th>タイトル</th>
                            <td>{{ form.comment}}</td>
                        </tr>
                        <tr>
                            <th>画像1</th>
                            <td>{{ form.image1}}</td>
                        </tr>
                        <tr>
                            <th>画像2</th>
                            <td>{{ form.image2}}</td>
                        </tr>
                    </table>
                    <hr>
                    <button type = "submit">投稿する</button>
                </form>
            </div>
        </div>
    </div>
    {% endblock %}
